time_limit: "02:00:00"   # landscapes are fast: 30×30 = 900 forward passes per job
command_timeout: 50      # ~5 min JIT warmup + ~30 min grid eval + headroom

# 8 landscape jobs, 2 per GPU — one job per unique track from the multi-track opt plan
# All: sobolev_loss_geomean_log1p, 30×30 grid, ±20% range around GT, with gradients
#
# Tracks covered:
#   GPU 0 — diagonal_100MeV (no noise + noise)       the single-track winner
#   GPU 1 — x100, z100                               axial 100 MeV pair
#   GPU 2 — diagonal@1000, X@1000                   high-T reference (degeneracy visible here)
#   GPU 3 — Z@1000, y100                             completes both axial sets

gpus:
  0:
    # diagonal at 100 MeV — no noise (confirmed best single-track)
    - python src/analysis/2d_loss_landscape.py --track-name diagonal_100MeV --direction 1,1,1 --momentum 100.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --results-dir $RESULTS_DIR/2d_landscape
    # diagonal at 100 MeV — with noise (shows noise-floor flattening)
    - python src/analysis/2d_loss_landscape.py --track-name diagonal_100MeV --direction 1,1,1 --momentum 100.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --noise-scale 1.0 --results-dir $RESULTS_DIR/2d_landscape

  1:
    # X-axis at 100 MeV
    - python src/analysis/2d_loss_landscape.py --track-name x100 --direction 1,0,0 --momentum 100.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --results-dir $RESULTS_DIR/2d_landscape
    # Z-axis at 100 MeV
    - python src/analysis/2d_loss_landscape.py --track-name z100 --direction 0,0,1 --momentum 100.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --results-dir $RESULTS_DIR/2d_landscape

  2:
    # diagonal at 1000 MeV — reference showing the alpha/beta_90 degeneracy
    - python src/analysis/2d_loss_landscape.py --track-name diagonal --direction 1,1,1 --momentum 1000.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --results-dir $RESULTS_DIR/2d_landscape
    # X-axis at 1000 MeV
    - python src/analysis/2d_loss_landscape.py --track-name X --direction 1,0,0 --momentum 1000.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --results-dir $RESULTS_DIR/2d_landscape

  3:
    # Z-axis at 1000 MeV
    - python src/analysis/2d_loss_landscape.py --track-name Z --direction 0,0,1 --momentum 1000.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --results-dir $RESULTS_DIR/2d_landscape
    # Y-axis at 100 MeV — completes the axial 100 MeV set (X+Y+Z combo on GPU 0 of opt plan)
    - python src/analysis/2d_loss_landscape.py --track-name y100 --direction 0,1,0 --momentum 100.0 --grid 30 --range-frac 0.2 --loss sobolev_loss_geomean_log1p --gradients --results-dir $RESULTS_DIR/2d_landscape

# Runs on the login node after all GPU jobs finish.
# Combines individual-track PKLs into joint loss surfaces matching the combos
# used in plan_2D_opt_recomb_params_multiple_tracks.yaml.
#
# PKL names produced above (sobolev_loss_geomean_log1p, 30×30, no noise unless noted):
#   diagonal_100MeV  → landscape_sobolev_loss_geomean_log1p_diagonal_100MeV_T100MeV_30x30.pkl
#   x100             → landscape_sobolev_loss_geomean_log1p_x100_T100MeV_30x30.pkl
#   z100             → landscape_sobolev_loss_geomean_log1p_z100_T100MeV_30x30.pkl
#   diagonal@1000    → landscape_sobolev_loss_geomean_log1p_diagonal_T1000MeV_30x30.pkl
#   X@1000           → landscape_sobolev_loss_geomean_log1p_X_T1000MeV_30x30.pkl
#   Z@1000           → landscape_sobolev_loss_geomean_log1p_Z_T1000MeV_30x30.pkl

post_gpu_jobs:
  # diagonal_100MeV + x100  (GPU 1 of opt plan)
  - python src/analysis/combine_landscapes.py $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_diagonal_100MeV_T100MeV_30x30.pkl $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_x100_T100MeV_30x30.pkl --output-dir $RESULTS_DIR/2d_landscape/combined_landscapes

  # diagonal_100MeV + x100 + z100  (GPU 0 of opt plan)
  - python src/analysis/combine_landscapes.py $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_diagonal_100MeV_T100MeV_30x30.pkl $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_x100_T100MeV_30x30.pkl $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_z100_T100MeV_30x30.pkl --output-dir $RESULTS_DIR/2d_landscape/combined_landscapes

  # diagonal_100MeV + diagonal@1000  (GPU 2 of opt plan — momentum lever arm)
  - python src/analysis/combine_landscapes.py $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_diagonal_100MeV_T100MeV_30x30.pkl $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_diagonal_T1000MeV_30x30.pkl --output-dir $RESULTS_DIR/2d_landscape/combined_landscapes

  # diagonal_100MeV + X@1000 + Z@1000  (GPU 3 of opt plan)
  - python src/analysis/combine_landscapes.py $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_diagonal_100MeV_T100MeV_30x30.pkl $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_X_T1000MeV_30x30.pkl $RESULTS_DIR/2d_landscape/landscape_sobolev_loss_geomean_log1p_Z_T1000MeV_30x30.pkl --output-dir $RESULTS_DIR/2d_landscape/combined_landscapes

