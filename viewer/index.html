<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JAXTPC Correspondence Viewer</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<div id="overlay"><div class="spinner"></div><div class="msg" id="overlayMsg">Loading event...</div></div>

<div id="loading">
  <h1>JAXTPC</h1>
  <div class="sub">Segment Correspondence Viewer</div>
  <div id="loadStatus">Connecting...</div>
</div>

<div id="app">
  <div id="toolbar">
    <div class="logo">JAXTPC</div>
    <div class="sep"></div>
    <div class="btn-group"><button id="corrBtn" class="active">CORR</button></div>
    <div class="sep"></div>
    <span class="toolbar-label">EVENT</span>
    <div class="btn-group">
      <button id="evPrev">&larr;</button>
      <input type="number" id="evInput" value="0" min="0">
      <button id="evNext">&rarr;</button>
    </div>
    <span id="evTotal" class="toolbar-label"></span>
    <div class="sep"></div>
    <select id="volSelect"></select>
    <div class="btn-group" id="viewGrp">
      <button data-v="hits" class="active">HITS</button>
      <button data-v="resp">RESP</button>
      <button data-v="optical" id="opticalBtn">OPTICAL</button>
    </div>
    <div class="btn-group" id="colorModeGrp">
      <button data-v="de" class="active">dE</button>
      <button data-v="label">LABEL</button>
    </div>
    <select id="labelSelect" style="display:none">
      <option value="track">Track</option>
      <option value="pdg">PDG</option>
      <option value="ancestor">Ancestor</option>
      <option value="interaction">Interaction</option>
    </select>
    <select id="catFilterSelect" style="display:none"></select>
    <input type="number" id="catFilterInput" placeholder="ID" style="display:none">
    <div class="btn-group"><button id="driftBtn">DRIFT</button></div>
    <div class="btn-group"><button id="resetBtn">RESET</button></div>
    <div class="btn-group"><button id="rotBtn" class="active">ROTATE</button></div>
    <div class="btn-group"><button id="fsBtn">&#x26F6; FULLSCREEN</button></div>
    <div class="theme-switch" id="themeSwitch"><span class="ts-icon ts-dark active">&#x263D;</span><span class="ts-icon ts-light">&#x2600;</span></div>
    <div class="btn-group"><button id="settingsBtn">&#x2699;</button></div>
    <div id="status">Connecting...</div>
  </div>
  <div id="settingsPanel">
    <button class="close" id="settingsClose">&times;</button>
    <div class="settings-section">3D SETTINGS</div>
    <label>dE Emphasis: <span id="emphVal">75%</span></label>
    <input type="range" id="emphSlider" min="0" max="1" step="0.05" value="0.75">
    <label>Emphasis Power: <span id="emphPowVal">5.0</span></label>
    <input type="range" id="emphPowSlider" min="1" max="6" step="0.5" value="5">
    <label style="display:flex;align-items:center;gap:6px;margin-top:4px"><input type="checkbox" id="volBoundsChk" checked> Volume Boundaries</label>
    <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="anodeCathodeChk"> Anode / Cathode Planes</label>
    <div class="settings-divider">DRIFT ANIMATION</div>
    <label>Speed: <span id="driftSpeedVal">200</span>× real time</label>
    <input type="range" id="driftSpeedSlider" min="50" max="1000" step="25" value="200">
    <label>Fade Duration: <span id="fadeDurVal">250</span> μs</label>
    <input type="range" id="fadeDurSlider" min="0" max="500" step="25" value="250">
    <label>Loop Pause: <span id="loopPauseVal">1.5</span>s</label>
    <input type="range" id="loopPauseSlider" min="0.5" max="3" step="0.25" value="1.5">
    <div class="settings-divider">RESPONSE SETTINGS</div>
    <label>Gamma: <span id="gammaVal">0.20</span></label>
    <input type="range" id="gammaSlider" min="0.05" max="1" step="0.05" value="0.2">
    <label>Deadband (ADC)</label>
    <input type="number" id="deadbandInput" value="2.0" min="0" step="0.5">
    <div class="settings-divider">OPTICAL SETTINGS</div>
    <label>Activity Threshold (ADC)</label>
    <input type="number" id="optThreshInput" value="50" min="10" step="10">
    <label>Gap Threshold (µs)</label>
    <input type="number" id="optGapInput" value="5.0" min="0.5" step="0.5">
  </div>
  <div id="main">
    <div id="panel3d">
      <div class="panel-label" id="label3d"><span id="label3dText">3D SEGMENTS</span></div>
      <div class="panel-actions" id="actions3d"><button class="pa-btn" id="save3d" title="Save PNG">&#x2B73;</button><button class="pa-btn" id="copy3d" title="Copy to clipboard">&#x2398;</button></div>
      <div id="driftBar">
        <button id="driftPlayPause" title="Play/Pause">&#x25B6;</button>
        <input type="range" id="driftScrubber" min="0" max="1" step="0.001" value="0">
        <span id="driftTimeLabel">0.0 μs</span>
      </div>
    </div>
    <div id="divider"></div>
    <div id="panel2d">
      <div class="panel-label" id="label2d"><span id="label2dText">EVENT DISPLAY</span></div>
      <div class="panel-actions" id="actions2d"><button class="pa-btn" id="save2d" title="Save PNG">&#x2B73;</button><button class="pa-btn" id="copy2d" title="Copy to clipboard">&#x2398;</button><button class="pa-btn" id="panelCloseBtn" title="Close expanded view">&times;</button></div>
      <canvas id="canvas2d"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script type="module" src="viewer.js"></script>
</body>
</html>
